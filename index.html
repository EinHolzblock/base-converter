<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Converter | Red & Black</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Number Converter</h2>
        
        <div class="input-group">
            <label for="dec">Decimal (Base 10)</label>
            <input type="number" id="dec" placeholder="e.g. 255" oninput="convert(this, 10)">
        </div>

        <div class="input-group">
            <label for="hex">Hexadecimal (Base 16)</label>
            <input type="text" id="hex" placeholder="e.g. FF" oninput="convert(this, 16)">
        </div>

        <div class="input-group">
            <label for="bin">Binary (Base 2)</label>
            <input type="text" id="bin" placeholder="e.g. 11111111" oninput="convert(this, 2)">
        </div>
    </div>

    <script>
        function convert(input, base) {
            const val = input.value.trim();
            const decInput = document.getElementById('dec');
            const hexInput = document.getElementById('hex');
            const binInput = document.getElementById('bin');

            if (!val) {
                decInput.value = "";
                hexInput.value = "";
                binInput.value = "";
                return;
            }

            const decimalValue = parseInt(val, base);

            if (isNaN(decimalValue)) return;

            if (base !== 10) decInput.value = decimalValue;
            if (base !== 16) hexInput.value = decimalValue.toString(16).toUpperCase();
            if (base !== 2)  binInput.value = decimalValue.toString(2);
        }
    </script>
</body>
</html>
